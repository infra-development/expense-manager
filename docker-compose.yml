# Local PostgreSQL for development.
# Start: docker compose up -d
# Stop:  docker compose down
# See:   docs/local-development-setup.md

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-manager-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expense_manager}
      POSTGRES_USER: ${POSTGRES_USER:-expense_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expense_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-expense_manager} -d ${POSTGRES_DB:-expense_manager}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
