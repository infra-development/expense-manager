spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/expense_manager}
    username: ${SPRING_DATASOURCE_USERNAME:expense_manager}
    password: ${SPRING_DATASOURCE_PASSWORD:expense_manager}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    com.expensemanager: INFO
    org.flywaydb: INFO
